# Cloudflare Pages configuration
# Required for the atproto dependency chain (undici, node builtins like
# string_decoder) and @tiptap/html (ProseMirror DOMSerializer), which need
# Node.js APIs not available in vanilla Workers.
#
# pages_build_output_dir is what makes this file VALID for Pages builds —
# without it the build logs "wrangler.toml … does not appear to be valid …
# Skipping" and the nodejs_compat flag never reaches the Functions bundler,
# which then fails on `Could not resolve "string_decoder"`.
pages_build_output_dir = ".svelte-kit/cloudflare"
compatibility_flags = ["nodejs_compat"]
compatibility_date = "2024-09-23"
